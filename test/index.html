<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Industry Digest</title>
<style>
/* ── Reset & Base ───────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: #f7f8fa;
  color: #1a1a2e;
  line-height: 1.6;
}

/* ── Header ───────────── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: white;
  padding: 32px 20px 24px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
.header .subtitle { font-size: 13px; opacity: 0.6; margin-top: 4px; }
.header .date-nav { display: flex; justify-content: center; gap: 16px; margin-top: 12px; font-size: 14px; }
.header .date-nav a { color: rgba(255,255,255,0.7); text-decoration: none; padding: 4px 12px; border-radius: 16px; transition: all 0.2s; }
.header .date-nav a:hover, .header .date-nav a.active { background: rgba(255,255,255,0.15); color: white; }

/* ── Container ───────────── */
.container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

/* ── Overview Section ───────────── */
.overview {
  background: white;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.overview .meta { font-size: 13px; color: #888; margin-bottom: 12px; }
.overview .meta span { margin-right: 16px; }
.overview .insight {
  font-size: 15px;
  line-height: 1.8;
  color: #333;
  padding: 16px 20px;
  background: #f0f7ff;
  border-radius: 12px;
  border-left: 4px solid #3b82f6;
  margin-bottom: 16px;
}
.overview .keywords { display: flex; gap: 8px; flex-wrap: wrap; }
.keyword {
  background: #eef2ff;
  color: #4338ca;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}

/* ── Source Group ───────────── */
.source-group { margin-bottom: 28px; }
.source-group-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px; margin-bottom: 12px;
  border-bottom: 2px solid #e5e7eb;
  font-size: 15px; font-weight: 600; color: #374151;
}
.source-group-header .icon { font-size: 18px; }
.source-group-header .count { font-size: 12px; color: #9ca3af; font-weight: 400; margin-left: auto; }

/* ── Article Card ───────────── */
.article-card {
  background: white;
  border-radius: 14px;
  margin-bottom: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  overflow: hidden;
  border: 1px solid #f0f0f0;
}
.article-card.high { border-left: 4px solid #ef4444; }
.article-card.medium { border-left: 4px solid #f59e0b; }
.article-card.low { border-left: 4px solid #d1d5db; }
.article-card.collapsed .article-body { display: none; }
.article-card.collapsed .collapse-btn { display: block; }

.article-header {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 16px 20px 12px;
  cursor: pointer;
}
.article-header:hover { background: #fafbfc; }
.article-header h3 { flex: 1; font-size: 15px; font-weight: 600; line-height: 1.5; color: #1a1a2e; }
.importance-badge {
  flex-shrink: 0;
  font-size: 11px; font-weight: 600;
  padding: 2px 10px; border-radius: 12px;
  text-transform: uppercase;
}
.importance-badge.high { background: #fef2f2; color: #dc2626; }
.importance-badge.medium { background: #fffbeb; color: #d97706; }
.importance-badge.low { background: #f9fafb; color: #9ca3af; }

.article-meta {
  padding: 0 20px 8px;
  display: flex; gap: 12px; align-items: center;
  font-size: 12px; color: #9ca3af;
}
.article-meta .source { font-weight: 500; color: #6366f1; }

/* ── Left-right layout for body ───────────── */
.article-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border-top: 1px solid #f3f4f6;
}

.article-body .left-panel {
  padding: 16px 20px;
  background: #fafbfc;
  border-right: 1px solid #f3f4f6;
  font-size: 13px;
  line-height: 1.7;
  color: #4b5563;
  max-height: 300px;
  overflow-y: auto;
}
.article-body .left-panel .label {
  font-size: 11px; font-weight: 600; color: #9ca3af;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px;
}
.article-body .left-panel .excerpt {
  display: -webkit-box;
  -webkit-line-clamp: 6;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-body .left-panel .original-link {
  display: inline-block; margin-top: 8px;
  font-size: 12px; color: #6366f1; text-decoration: none;
  font-weight: 500;
}
.article-body .left-panel .original-link:hover { text-decoration: underline; }

.article-body .right-panel {
  padding: 16px 20px;
  font-size: 13px;
}
.article-body .right-panel .label {
  font-size: 11px; font-weight: 600; color: #9ca3af;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px;
}
.article-body .right-panel .ai-summary {
  color: #1f2937;
  line-height: 1.7;
  margin-bottom: 10px;
}
.article-body .right-panel .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.article-body .right-panel .tag {
  background: #eef2ff; color: #4338ca;
  padding: 2px 10px; border-radius: 12px; font-size: 11px;
}
.article-body .right-panel .reason {
  font-size: 12px; color: #6b7280;
  font-style: italic;
}

/* ── Action buttons (PDF + Feedback) ───────────── */
.article-actions {
  display: flex; gap: 8px; align-items: center;
  padding: 8px 20px;
  border-top: 1px solid #f3f4f6;
  background: #fafbfc;
}
.btn-pdf, .btn-feedback {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 8px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid #e5e7eb; background: white;
  transition: all 0.15s;
}
.btn-pdf:hover { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
.btn-feedback:hover { background: #f0fdf4; border-color: #bbf7d0; }
.btn-feedback.active { background: #f0fdf4; border-color: #86efac; color: #16a34a; }
.btn-feedback.negative:hover { background: #fef2f2; border-color: #fecaca; }
.btn-feedback.negative.active { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
.feedback-msg {
  font-size: 11px; color: #16a34a; margin-left: 4px;
}

/* ── Collapse toggle ───────────── */
.collapse-btn {
  display: none;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  color: #9ca3af;
  cursor: pointer;
  border-top: 1px solid #f3f4f6;
  background: #fafbfc;
}
.collapse-btn:hover { background: #f0f0f0; }
.article-card:not(.collapsed) .collapse-btn { display: block; }

/* ── Loading / Error / Empty ───────────── */
.loading, .error, .empty {
  text-align: center; padding: 60px 20px;
  background: white; border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.loading { color: #9ca3af; }
.error { color: #ef4444; }
.empty { color: #9ca3af; }
.loading .spinner {
  width: 32px; height: 32px;
  border: 3px solid #e5e7eb; border-top-color: #6366f1;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ───────────── */
@media (max-width: 640px) {
  .header { padding: 20px 16px 16px; }
  .header h1 { font-size: 20px; }
  .container { padding: 12px 10px; }
  .overview { padding: 16px; }
  .overview .insight { font-size: 14px; padding: 12px 16px; }
  .article-header { padding: 12px 14px 8px; }
  .article-header h3 { font-size: 14px; }
  .article-meta { padding: 0 14px 6px; flex-wrap: wrap; }
  .article-body { grid-template-columns: 1fr; }
  .article-body .left-panel { border-right: none; border-bottom: 1px solid #f3f4f6; max-height: 200px; }
  .article-body .left-panel, .article-body .right-panel { padding: 12px 14px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>AI Industry Digest</h1>
  <div class="subtitle">人工智能行业每日精选</div>
  <div class="date-nav" id="dateNav"></div>
</div>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>加载中...</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const API_BASE = 'http://localhost:8000';
let allReports = [];
let currentDate = '';

// ── 启动 ───────────────────────────
(async function init() {
  try {
    // 加载日报列表
    const res = await fetch(`${API_BASE}/api/reports?page=1&page_size=14`);
    const data = await res.json();
    allReports = data.items || [];

    if (allReports.length === 0) {
      document.getElementById('app').innerHTML = '<div class="empty">📭 暂无日报数据</div>';
      document.getElementById('dateNav').innerHTML = '';
      return;
    }

    // 渲染日期导航
    renderDateNav();

    // 默认加载最新一期
    currentDate = allReports[0].report_date;
    loadReport(currentDate);
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="error">❌ 网络错误: ${e.message}<br><small>请确保 FastAPI 已启动 (python -m uvicorn api.main:app --reload)</small></div>`;
  }
})();

// ── 日期导航 ───────────────────────
function renderDateNav() {
  const nav = document.getElementById('dateNav');
  nav.innerHTML = allReports.map(r =>
    `<a href="#" data-date="${r.report_date}" class="${r.report_date === currentDate ? 'active' : ''}"
        onclick="loadReport('${r.report_date}')">${formatDateShort(r.report_date)}</a>`
  ).join('');
}

// ── 加载日报 ───────────────────────
async function loadReport(date) {
  currentDate = date;
  document.getElementById('app').innerHTML =
    '<div class="loading"><div class="spinner"></div><div>加载中...</div></div>';

  // 更新导航高亮
  document.querySelectorAll('#dateNav a').forEach(a => {
    a.classList.toggle('active', a.dataset.date === date);
  });

  try {
    const res = await fetch(`${API_BASE}/api/reports/${date}`);
    if (res.status === 404) {
      document.getElementById('app').innerHTML = '<div class="empty">📭 暂无该日报</div>';
      return;
    }
    const report = await res.json();
    renderReport(report);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error">❌ 加载失败: ${e.message}</div>`;
  }
}

// ── 渲染日报 ───────────────────────
function renderReport(report) {
  // 展平所有文章
  const allArticles = [];
  for (const level of ['high', 'medium', 'low']) {
    for (const a of (report.articles?.[level] || [])) {
      allArticles.push({ ...a, _importance: level });
    }
  }

  // 按来源分组
  const groups = {};
  for (const a of allArticles) {
    const src = a.source_name || '其他';
    if (!groups[src]) groups[src] = [];
    groups[src].push(a);
  }

  // 来源图标映射
  const sourceIcons = {
    'arXiv': '📄', 'arXiv (AI+LG+CL)': '📄',
    'arXiv cs.LG': '📄', 'arXiv cs.CL': '📄', 'arXiv cs.AI': '📄',
    '量子位': '🔬', '36氪': '💡', '36氪 - AI': '💡',
    '机器之心': '🤖', 'GitHub Trending AI': '⭐',
  };

  let html = '';

  // ── 概览区 ──
  html += `
    <div class="overview">
      <div class="meta">
        <span>📅 ${report.report_date}</span>
        <span>📰 ${allArticles.length} 篇文章</span>
        <span>📡 ${Object.keys(groups).length} 个来源</span>
      </div>
      ${report.summary_insight ? `<div class="insight">💡 ${report.summary_insight}</div>` : ''}
      ${report.trending_keywords?.length ? `
        <div class="keywords">
          ${report.trending_keywords.map(k => `<span class="keyword">${k}</span>`).join('')}
        </div>` : ''}
    </div>
  `;

  // ── 按来源分组 ──
  const groupOrder = Object.keys(groups).sort((a, b) => {
    const aHigh = groups[a].filter(x => x._importance === 'high').length;
    const bHigh = groups[b].filter(x => x._importance === 'high').length;
    return bHigh - aHigh;
  });

  for (const src of groupOrder) {
    const articles = groups[src];
    const icon = Object.entries(sourceIcons).find(([key]) => src.includes(key))?.[1] || '📰';
    const highCount = articles.filter(a => a._importance === 'high').length;
    const isExpandedByDefault = highCount > 0;

    html += `<div class="source-group">`;
    html += `<div class="source-group-header">
      <span class="icon">${icon}</span> ${src}
      <span class="count">${articles.length} 篇</span>
    </div>`;

    for (const a of articles) {
      const isHigh = a._importance === 'high';
      const isCollapsed = !isHigh; // high展开，其余折叠
      const excerpt = extractExcerpt(a.raw_content || '');
      const tags = (a.tags || []).filter(Boolean);

      html += `
        <div class="article-card ${a._importance} ${isCollapsed ? 'collapsed' : ''}"
             data-url="${escapeHtml(a.url || '')}" data-title="${escapeHtml(a.title || '')}"
             data-source="${escapeHtml(a.source_name || '')}" data-summary="${escapeHtml(a.summary || '')}">
          <div class="article-header" onclick="toggleCard(this)">
            <h3>${escapeHtml(a.title || '(无标题)')}</h3>
            <span class="importance-badge ${a._importance}">
              ${a._importance === 'high' ? '重要' : a._importance === 'medium' ? '一般' : '参考'}
            </span>
          </div>
          <div class="article-meta">
            <span class="source">${escapeHtml(a.source_name || '')}</span>
            ${a.published_at ? `<span>${a.published_at.slice(0,10)}</span>` : ''}
            ${a.url ? `<a href="${escapeHtml(a.url)}" target="_blank" style="color:#6366f1;text-decoration:none" onclick="event.stopPropagation()">原文 →</a>` : ''}
          </div>
          <div class="article-body">
            <div class="left-panel">
              <div class="label">原文概要</div>
              <div class="excerpt">${escapeHtml(excerpt)}</div>
              ${a.url ? `<a href="${escapeHtml(a.url)}" target="_blank" class="original-link">阅读原文 →</a>` : ''}
            </div>
            <div class="right-panel">
              <div class="label">AI 分析</div>
              <div class="ai-summary">${escapeHtml(a.summary || '暂无摘要')}</div>
              ${tags.length ? `<div class="tags">${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
              ${a.importance_reason ? `<div class="reason">💬 ${escapeHtml(a.importance_reason)}</div>` : ''}
            </div>
          </div>
          <div class="article-actions">
            <button class="btn-pdf" onclick="event.stopPropagation();exportPDF(this)">📥 PDF</button>
            <button class="btn-feedback" onclick="event.stopPropagation();submitFeedback(this, 'thumbs_up')">👍 有用</button>
            <button class="btn-feedback negative" onclick="event.stopPropagation();submitFeedback(this, 'thumbs_down')">👎 没用</button>
          </div>
          <div class="collapse-btn" onclick="toggleCard(this.parentElement.querySelector('.article-header'))">
            ${isCollapsed ? '展开全文 ▼' : '收起 ▲'}
          </div>
        </div>`;
    }

    html += `</div>`;
  }

  if (allArticles.length === 0) {
    html += `<div class="empty">
      📭 今日暂无收录内容<br>
      <small style="color:#9ca3af">可能有新文章在采集路上，请稍后再来看看</small>
    </div>`;
  }

  document.getElementById('app').innerHTML = html;
}

// ── 折叠/展开 ─────────────────────
function toggleCard(headerEl) {
  const card = headerEl.closest('.article-card');
  card.classList.toggle('collapsed');
  const btn = card.querySelector('.collapse-btn');
  if (btn) btn.textContent = card.classList.contains('collapsed') ? '展开全文 ▼' : '收起 ▲';
}

// ── PDF 导出 ─────────────────────
function exportPDF(btnEl) {
  const card = btnEl.closest('.article-card');
  const title = card.dataset.title || 'article';
  const source = card.dataset.source || '';
  const summary = card.dataset.summary || '';
  const url = card.dataset.url || '';

  // 展开卡片以获取完整内容
  card.classList.remove('collapsed');

  // 构建 PDF 内容
  const element = document.createElement('div');
  element.innerHTML = `
    <div style="padding:40px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;max-width:700px;margin:0 auto">
      <h1 style="font-size:22px;color:#1a1a2e;margin-bottom:8px">${escapeHtml(title)}</h1>
      <div style="font-size:13px;color:#888;margin-bottom:16px">
        <span>${escapeHtml(source)}</span>
        <span style="margin:0 8px">·</span>
        <span>AI Industry Digest</span>
      </div>
      ${url ? `<div style="font-size:12px;color:#6366f1;margin-bottom:16px">原文: ${escapeHtml(url)}</div>` : ''}
      <div style="border-top:1px solid #e5e7eb;padding-top:16px">
        <h3 style="font-size:15px;color:#374151;margin-bottom:8px">AI 摘要</h3>
        <p style="font-size:14px;line-height:1.8;color:#4b5563">${escapeHtml(summary || '暂无摘要')}</p>
      </div>
      ${card.querySelector('.left-panel .excerpt') ? `
      <div style="border-top:1px solid #e5e7eb;padding-top:16px;margin-top:16px">
        <h3 style="font-size:15px;color:#374151;margin-bottom:8px">原文概要</h3>
        <p style="font-size:14px;line-height:1.8;color:#4b5563">${card.querySelector('.left-panel .excerpt').textContent}</p>
      </div>` : ''}
      <div style="margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;text-align:center">
        由 AI Industry Digest 自动生成
      </div>
    </div>
  `;

  const opt = {
    margin:        [10, 10],
    filename:     `${title.slice(0, 30)}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save();
}

// ── 文章反馈 ─────────────────────
async function submitFeedback(btnEl, type) {
  const card = btnEl.closest('.article-card');
  const articleId = card.dataset.articleId;

  // 如果没有 articleId，从 URL 映射
  if (!articleId) {
    // 通过标题查找（临时方案：无登录状态）
    const url = card.dataset.url;
    const title = card.dataset.title;
    try {
      const res = await fetch(`${API_BASE}/api/articles?keyword=${encodeURIComponent(title.slice(0, 30))}&page_size=1`);
      const data = await res.json();
      if (data.items && data.items.length > 0) {
        card.dataset.articleId = data.items[0].id;
      }
    } catch(e) {
      console.error('Feedback error:', e);
    }
  }

  // 显示反馈状态
  const allBtns = card.querySelectorAll('.btn-feedback');
  allBtns.forEach(b => b.classList.remove('active'));

  if (type === 'thumbs_up') {
    btnEl.classList.add('active');
  } else {
    btnEl.classList.add('active', 'negative');
  }
}
function formatDateShort(dateStr) {
  const d = new Date(dateStr);
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} 周${weekdays[d.getDay()]}`;
}

function extractExcerpt(text) {
  if (!text) return '暂无原文内容';
  // 清理 HTML 标签
  let clean = text.replace(/<[^>]+>/g, '');
  // 截取 200 字
  if (clean.length > 200) clean = clean.slice(0, 200) + '...';
  return clean;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
</script>
</body>
</html>
