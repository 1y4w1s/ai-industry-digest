name: 每周数据库备份

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日 0:00 UTC
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install supabase python-dotenv

      - name: 导出数据
        run: |
          python -c "
import os, json
from supabase import create_client
url = os.environ['SUPABASE_URL']
key = os.environ['SUPABASE_KEY']
client = create_client(url, key)

# 导出文章
arts = client.table('articles').select('*').execute()
with open('backup_articles.json', 'w', encoding='utf-8') as f:
    json.dump(arts.data, f, ensure_ascii=False, default=str)
print(f'✅ 导出 {len(arts.data)} 篇文章')
"

      - name: 上传备份
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup_*.json
          retention-days: 30  # 保留 30 天
