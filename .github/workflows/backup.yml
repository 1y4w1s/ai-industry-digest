name: Weekly Backup

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install supabase python-dotenv

      - name: Export data
        run: |
          python -c "
import os, json
from supabase import create_client
url = os.environ['SUPABASE_URL']
key = os.environ['SUPABASE_KEY']
client = create_client(url, key)

arts = client.table('articles').select('*').execute()
with open('backup_articles.json', 'w', encoding='utf-8') as f:
    json.dump(arts.data, f, ensure_ascii=False, default=str)
print(f'Exported {len(arts.data)} articles')
"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup_*.json
          retention-days: 30
