# ============================================================
# Signal - GitHub Actions 自动化部署
#
# 流程：push master → 并发执行 迁移 + 前端构建 → 同步到服务器 → 重启服务
#
# 相比旧版 deploy.sh 的改进：
#   - 数据库迁移在 CI 中执行，错误立即可见（不再被 2>/dev/null 吞掉）
#   - 前端在 CI 中构建，利用缓存加速（避免服务器 Node.js 版本问题）
#   - 服务器只做重启，部署更快更稳定
#
# 需要的 Secrets（GitHub → Settings → Secrets and variables → Actions）：
#   - SSH_PRIVATE_KEY          服务器 SSH 私钥（必填）
#   - VITE_SUPABASE_URL        前端 Supabase 项目 URL（必填，用于构建）
#   - VITE_SUPABASE_ANON_KEY   前端 Supabase 匿名 key（必填，用于构建）
#   - DATABASE_URL             Supabase 数据库连接字符串（可选，未配置时跳过迁移）
#                              postgresql://postgres:密码@db.xxx.supabase.co:5432/postgres
# ============================================================

name: 🚀 Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_migration:
        description: '跳过数据库迁移'
        required: false
        type: boolean
        default: false

# 防止同时部署：如果有新的 push，取消当前正在进行的部署
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: 数据库迁移（可选跳过） ──────────────────────
  migrate:
    name: 数据库迁移
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !inputs.skip_migration }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 PostgreSQL 客户端
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: 列出待执行的迁移文件
        run: |
          echo "找到以下迁移文件："
          ls -1 scripts/migration_*.sql 2>/dev/null | sort || echo "(无迁移文件)"

      - name: 按顺序执行数据库迁移（尝试多种端口）
        run: |
          DB_URL="${{ secrets.DATABASE_URL }}"
          # 如果没配 DATABASE_URL，跳过
          if [ -z "$DB_URL" ]; then
            echo "⚠️ DATABASE_URL 未配置，跳过迁移"
            echo "  请手动在 Supabase SQL Editor 中执行迁移文件"
            exit 0
          fi

          # 尝试多种连接方式：直接(5432) → 连接池(6543)
          for port in 5432 6543; do
            TRIAL_URL=$(echo "$DB_URL" | sed "s/:5432\b/:$port/")
            echo "尝试连接端口 $port ..."
            if psql "$TRIAL_URL" -c "SELECT 1" > /dev/null 2>&1; then
              echo "✅ 端口 $port 连接成功"
              for f in $(ls scripts/migration_*.sql 2>/dev/null | sort); do
                echo ""
                echo "▶▶▶ 执行: $f"
                psql "$TRIAL_URL" -f "$f"
                echo "✅ $f 完成"
              done
              echo ""
              echo "=============================="
              echo "  所有迁移执行完毕"
              echo "=============================="
              exit 0
            else
              echo "  端口 $port 连接失败，尝试下一个..."
            fi
          done

          echo "⚠️ 数据库连接失败，跳过迁移"
          echo "  请手动在 Supabase SQL Editor 中执行迁移文件"
          echo "  迁移文件列表："
          ls -1 scripts/migration_*.sql 2>/dev/null | sort || echo "  (无迁移文件)"

  # ── Job 2: 构建前端 ──────────────────────────────────
  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        working-directory: frontend
        run: npm ci

      - name: 构建生产版本
        working-directory: frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Job 3: 部署到服务器 ──────────────────────────────
  deploy:
    name: 部署到服务器
    needs: [build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: 配置 SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 确保目录结构完整
        run: |
          mkdir -p frontend/dist
          echo ""
          echo "=============================="
          echo "  确认产物结构"
          echo "=============================="
          echo ""
          echo "📁 前端 dist 目录（共 $(find frontend/dist -type f 2>/dev/null | wc -l) 个文件）："
          ls -la frontend/dist/ 2>/dev/null || echo "(空)"
          echo ""
          echo "📁 后端代码结构："
          for d in api config collector processor scripts; do
            COUNT=$(find $d -type f 2>/dev/null | wc -l)
            echo "  $d/  ($COUNT 个文件)"
          done
          echo "  requirements.txt  $(test -f requirements.txt && echo '✅' || echo '❌')"
          echo "  run.py  $(test -f run.py && echo '✅' || echo '❌')"

      - name: 同步代码到服务器
        run: |
          echo "📤 同步代码到服务器..."
          tar czf - \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='node_modules' \
            --exclude='.git' \
            api/ config/ collector/ processor/ scripts/ \
            frontend/dist/ requirements.txt run.py \
            | ssh -o StrictHostKeyChecking=no ubuntu@43.139.133.245 \
              "cd /opt/ai-industry-digest && tar xzf -"
          echo "✅ 同步完成"

      - name: 在服务器上安装依赖 + 重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.139.133.245
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/ai-industry-digest

            echo "📦 [1/3] 安装 Python 依赖..."
            # 创建 swap 防止内存不足（pip install 可能 OOM）
            if ! swapon --show | grep -q /swapfile; then
              echo "  创建 swap 文件（1GB）..."
              sudo fallocate -l 1G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=1024
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            pip install --no-cache-dir -r requirements.txt -q
            echo "   ✅ 依赖已更新"

            echo "📦 [2/3] 修复前端产物权限..."
            sudo chmod -R 755 frontend/dist/ 2>/dev/null || true
            sudo systemctl restart nginx 2>/dev/null && echo "   ✅ Nginx 已重启" || echo "   ⚠️ Nginx 重启失败（跳过）"

            echo "📦 [3/3] 重启后端服务..."
            pkill -f "uvicorn api.main:app" 2>/dev/null || true
            sleep 1

            nohup /home/ubuntu/.local/bin/uvicorn api.main:app \
              --host 0.0.0.0 --port 8000 \
              > /opt/ai-industry-digest/backend.log 2>&1 &

            sleep 3

            if pgrep -f "uvicorn api.main:app" > /dev/null; then
              echo "   ✅ 后端服务已启动 (PID: $(pgrep -f 'uvicorn api.main:app'))"
            else
              echo "   ❌ 后端启动失败，查看日志："
              tail -20 /opt/ai-industry-digest/backend.log
              exit 1
            fi

            echo ""
            echo "=============================="
            echo "  部署完成"
            echo "  验证: curl http://localhost:8000/health"
            echo "=============================="

      - name: 健康检查
        run: |
          echo "等待服务启动..."
          sleep 3
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://43.139.133.245:8080/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ 服务健康检查通过"
              exit 0
            fi
            echo "  第 $i 次尝试，状态码: $STATUS，等待5秒..."
            sleep 5
          done
          echo "❌ 健康检查失败"
          curl -s http://43.139.133.245:8080/health || true
          exit 1

      - name: 清理 GitHub Actions 缓存
        run: |
          echo "🧹 清理构建产物缓存..."
          # artifact 设置 retention-days: 1，由 GitHub 自动清理
